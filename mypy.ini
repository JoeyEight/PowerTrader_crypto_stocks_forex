[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = True
no_implicit_optional = True

[mypy-runtime.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-ui.pt_hub]
ignore_errors = True

[mypy-engines.pt_thinker]
ignore_errors = True

[mypy-engines.pt_trader]
ignore_errors = True

[mypy-engines.pt_trainer]
ignore_errors = True
