name: CI

on:
  push:
    branches: ["main", "master", "codex/**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install mypy ruff black isort

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app brokers engines runtime

      - name: Format check
        run: |
          black --check .
          isort --check-only .

      - name: Unit tests
        run: python -m unittest -q

      - name: Smoke test
        run: python runtime/smoke_test_all.py
